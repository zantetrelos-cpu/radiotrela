<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Switcher</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* Κλειδώνει το scroll στην κύρια σελίδα */
        }
        .fullscreen-iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block; /* Αποτρέπει κενά κάτω από το iframe */
        }
        
        .switch-btn {
            position: absolute;
            bottom: 0px;
            left: 0px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .switch-btn:hover { opacity: 1; }
    </style>
</head>
<body>

    <!-- Προσθήκη scrolling="no" για να μην εμφανίζονται μπάρες -->
    <iframe id="chatFrame" src="https://minnit.chat/RadioSynnefa?embed&popout=hide" class="fullscreen-iframe" scrolling="no"></iframe>
    
    <button id="switchBtn" class="switch-btn" onclick="toggleChat()">Εναλλαγή</button>

    <script>
        let isFirst = true;
        const frame = document.getElementById('chatFrame');
        
        function toggleChat() {
            if (isFirst) {
                frame.src = "https://my-chat-jljp.onrender.com/";
            } else {
                frame.src = "https://minnit.chat/RadioSynnefa?embed&popout=hide";
            }
            isFirst = !isFirst;
        }
    </script>
</body>
</html>
