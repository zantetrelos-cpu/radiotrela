<script>
    // Ρολόι
    function updateClock() {
        const now = new Date();
        document.getElementById('time').textContent = new Intl.DateTimeFormat('el-GR', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        }).format(now);
        
        const parts = new Intl.DateTimeFormat('el-GR', { 
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
        }).format(now);
        document.getElementById('date').textContent = parts.charAt(0).toUpperCase() + parts.slice(1);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Neon Letters Script
    const textSpan = document.querySelector('.neon-text span');
    if(textSpan){
        const letters = textSpan.textContent.split('');
        textSpan.textContent = '';
        letters.forEach((letter, i) => {
            const s = document.createElement('span');
            s.textContent = letter;
            s.style.animationDelay = `${i * 0.1}s`;
            textSpan.appendChild(s);
        });
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDPGPtuU8ZIlz3qLP8V61UKQ07ad94LtZI",
        authDomain: "radiochatlive.firebaseapp.com",
        projectId: "radiochatlive",
        storageBucket: "radiochatlive.firebasestorage.app",
        messagingSenderId: "187137786763",
        appId: "1:187137786763:web:67c3e2effef793ea7f658e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ΑΥΤΟ ΕΙΝΑΙ ΤΟ "ΟΠΛΟ" ΣΟΥ - ΕΛΕΓΧΕΙ ΑΝ Ο ΧΡΗΣΤΗΣ ΥΠΑΡΧΕΙ ΣΤΗ ΒΑΣΗ
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                // Αναγκάζει τη Firebase να ελέγξει αν ο λογαριασμός είναι ακόμα ενεργός
                await user.getIdToken(true);
            } catch (error) {
                // Αν τον έχεις διαγράψει, θα "χτυπήσει" σφάλμα εδώ
                console.log("Ο χρήστης διαγράφηκε. Αποσύνδεση...");
                localStorage.clear();
                await signOut(auth);
                window.location.href = "egrafi.html"; // Βάλε εδώ το όνομα της σελίδας εγγραφής σου
            }
        } else {
            // Αν δεν είναι καν συνδεδεμένος, τον πετάει έξω
            localStorage.clear();
            window.location.href = "egrafi.html";
        }
    });
</script>
