<!DOCTYPE html>
<html lang="el">
<head>
 <meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ράδιο Σύννεφα - Radio Synnefa | Το πιο ερωτικό ραδιόφωνο</title>

<meta name="description" content="Ράδιο Σύννεφα - Radio Synnefa. Εδώ παίζουμε μόνο ερωτικά τραγούδια. Το πιο ερωτικό ραδιόφωνο στο διαδίκτυο.">

<meta name="keywords" content="ράδιο σύννεφα, radio synnefa, radio live, radio internet, web radio, chat radio, ερωτικά τραγούδια">

<meta name="author" content="Radio Synnefa">

<meta property="og:title" content="Ράδιο Σύννεφα - Radio Synnefa">
<meta property="og:description" content="Εδώ παίζουμε μόνο ερωτικά τραγούδια!">
<meta property="og:image" content="foto-face.png">
<meta property="og:url" content="https://zantetrelos-cpu.github.io/radiotrela/">

<link rel="shortcut icon" href="zante.ico">
<style>
  body{margin:0;font-family:Segoe UI,Arial,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;background:100% 100%}
 
  #loadingModal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  .modal-content {
    background: rgba(20, 20, 20, 0.9);
    padding: 30px;
    border: 2px solid #00ffcc;
    border-radius: 15px;
    color: #00ffcc;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    box-shadow: 0 0 30px #00ffcc;
    animation: pulse 1.5s infinite;
  }
 
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .player-btn {
    width:180px;height:180px;border-radius:50%;
    background: rgba(0, 0, 0, 0.0) url('radio.png') center/cover no-repeat;
    color:#00ffcc;font-size:20px;display:flex;align-items:flex-end;justify-content:center;
    position:absolute;top:40px;z-index:5;
    transition:transform .12s linear;
    text-shadow:0 0 8px #00ffcc;font-weight:bold;padding-bottom:10px;
    --glow-h: 174; 
    --glow-size: 20px;
    border: 4px solid hsl(var(--glow-h), 100%, 50%);
    box-shadow: 0 0 var(--glow-size) hsla(var(--glow-h), 100%, 50%, 0.8), 
                0 0 calc(var(--glow-size) / 2) hsla(var(--glow-h), 100%, 70%, 1);
  }

  #playBtn {
    position: absolute; top: 20px; right: 20px;
    width: 100px; height: 45px; border-radius: 8px;
    border: 2px solid #00ffcc; background: rgba(0, 0, 0, 0.5);
    color: #00ffcc; cursor: pointer; font-weight: bold; z-index: 100;
    box-shadow: 0 0 15px #00ffcc; display: flex; align-items: center; justify-content: center;
  }

#skipIntroBtn {
    display: none;
    position: absolute; bottom: 20px; right: 20px;
    width: 130px; height: 40px; border-radius: 8px;
    border: 2px solid #ffcc00; background: rgba(0, 0, 0, 0.7);
    color: #ffcc00; cursor: pointer; font-weight: bold; z-index: 101;
    font-size: 13px; align-items: center; justify-content: center;
    box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); transition: 0.3s;
  }
 
  #skipIntroBtn:hover { background: #ffcc00; color: #000; box-shadow: 0 0 20px #ffcc00; }
 
  #status{position:absolute;top:270px;font-weight:700;letter-spacing:1px;font-size:30px; z-index:6;}
  .onair{color:#00ff99;text-shadow:0 0 10px #00ff99}
  .offair{color:#ff6600;text-shadow:0 0 12px #ff6600}
  .loading{color:#ffaa00;text-shadow:0 0 10px #ffaa00}
 
  #equalizer{position:absolute;bottom:0;width:100%;height:100vh;z-index:1}
 
  /* --- ΕΝΗΜΕΡΩΜΕΝΟ ΣΤΥΛ ΤΙΤΛΟΥ (ΧΩΡΙΣ text-transform) --- */
  #nowPlaying {
    position: absolute;
    top: 380px;
    font-size: 26px;
    color: #fff;
    text-align: center;
    z-index: 4;
    width: 90%;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
    animation: glowText 2s ease-in-out infinite alternate;
  }

  @keyframes glowText {
    from { text-shadow: 0 0 10px #fff, 0 0 20px #00ffcc; transform: scale(1); }
    to { text-shadow: 0 0 20px #fff, 0 0 40px #00ffcc; transform: scale(1.03); }
  }
  /* ------------------------------------------------------ */

  #volumeControl {
    position: absolute;top: 330px;left: 50%;transform: translateX(-50%);
    display: flex;align-items: center;gap: 10px;z-index: 5;
  }
  #volumeSlider {Width: 250px;height: 5px;appearance: none;background: #333;border-radius: 5px;outline: none;box-shadow: 0 0 10px #00ffcc;}
  #volumeSlider::-webkit-slider-thumb {appearance: none;width: 18px;height: 18px;border-radius: 50%;background: #00ffcc;cursor: pointer;box-shadow: 0 0 10px #00ffcc;}
  #volumeValue {font-size: 18px;color: #00ffcc;text-shadow: 0 0 8px #00ffcc;width: 50px;text-align: left;}

  #effectBtn {
    position: absolute;top: 15px;left: 15px;width: 80px;height: 60px;
    background: rgba(0, 255, 204, 0.3);border: 3px solid #00ffcc;border-radius: 30px;
    display: flex;align-items: center;justify-content: center;cursor: pointer;z-index: 100;
    font-weight: bold;font-size: 16px;color: white;text-shadow: 0 0 10px #00ffcc;
    box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);transition: all 0.2s ease;
  }
  body::after {content: "";position: fixed;top: 0;left: 0;width: 100%;height: 100%;background-color: rgba(0, 0, 0, 0.7);z-index: -1;}
</style>
</head>
<body>

<div id="loadingModal">
  <div class="modal-content" id="modalText">Φόρτωση...</div>
</div>

<canvas id="equalizer"></canvas>
<div class="player-btn" id="visualizerCircle"></div>
<div id="playBtn">Play</div>
<div id="skipIntroBtn">Παράλειψη Intro</div>

<div id="status" class="offair">Πάτησε Play</div>
<div id="nowPlaying">Radio Synnefa Live</div>

<div id="volumeControl">
  <input type="range" id="volumeSlider" min="0" max="100" value="100">
  <span id="volumeValue">100%</span>
</div>

<div id="effectBtn">Bars</div>

<script>                        
const STREAMS = {
  live: { name: "ΚΥΡΙΟΣ ΣΕΡΒΕΡ", streamUrl: "https://freestream.hu:8340/trela233", statusUrl: "https://freestream.hu:8340/status-json.xsl?mount=/trela233" },
  backup: { name: "BACKUP ΣΕΡΒΕΡ", streamUrl: "https://stream.zeno.fm/x8gduy6xd48uv", zenoStationId: "x8gduy6xd48uv", zenoMetaUrl: (id) => `https://api.zeno.fm/mounts/metadata/subscribe/${id}` }
};

const INTRO_URL = "https://zantetrelos-cpu.github.io/radiotrela/%CE%A1%CE%AC%CE%B4%CE%B9%CE%BF%20%CE%A3%CF%8D%CE%BD%CE%BD%CE%B5%CF%86%CE%B1.mp3";
const originalRadioName = "Radio Synnefa LIVE";

let audio = new Audio(); audio.crossOrigin = "anonymous";
let audioCtx, analyser, dataArray, bufferLength, sourceNode;
let isPlaying = false, isLive = true, retryIntervalMs = 60000;
let isIntroActive = false, hasIntroPlayed = false;

const btn = document.getElementById('playBtn');
const skipBtn = document.getElementById('skipIntroBtn');
const visualizerCircle = document.getElementById('visualizerCircle');
const statusEl = document.getElementById('status');
const nowPlayingEl = document.getElementById('nowPlaying');
const canvas = document.getElementById('equalizer');
const ctx = canvas.getContext('2d');
const volumeSlider = document.getElementById('volumeSlider');
const volumeValue = document.getElementById('volumeValue');
const effectBtn = document.getElementById('effectBtn');
const loadingModal = document.getElementById('loadingModal');
const modalText = document.getElementById('modalText');

let zenoEventSource = null;
let zenoPollInterval = null;

function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function setupAudioNodes(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  sourceNode = audioCtx.createMediaElementSource(audio);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  drawEqualizer();
  startButtonBreath();
}

const effects = [
  (ctx, data, w, h) => {
    const barWidth = (w / bufferLength) * 2.5;
    let x = 0;
    for(let i = 0; i < bufferLength; i++){
      const barHeight = data[i] * 0.65;
      ctx.fillStyle = `hsla(${(i * 5 + barHeight) % 360}, 100%, ${50 + barHeight / 5}%, 0.4)`;
      ctx.fillRect(x, h - barHeight, barWidth, barHeight);
      x += barWidth + 1;
    }
  },
  (ctx, data, w, h) => {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, w, h);
    let total = 0;
    for(let i = 0; i < bufferLength; i++) total += data[i];
    const avg = total / bufferLength / 255;
    const starCount = 80 + Math.floor(avg * 200);
    const time = Date.now() * 0.002;
    for(let i = 0; i < starCount; i++){
      const x = (i * 131.7 + time * 50) % w;
      const y = (i * 89.3 + time * 30) % h;
      const size = 1 + Math.sin(time * 5 + i) * avg * 4;
      const opacity = 0.4 + avg * 0.6;
      const hue = (i * 7 + time * 100) % 360;
      ctx.shadowBlur = 15 + avg * 25;
      ctx.shadowColor = `hsla(${hue}, 100%, 80%, ${opacity})`;
      ctx.fillStyle = `hsla(${hue}, 100%, 95%, ${opacity})`;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  },
  (ctx, data, w, h) => {
      ctx.clearRect(0,0,w,h);
      const centerX = w / 2;
      const centerY = h / 2;
      const baseRadius = Math.min(centerX, centerY) * 0.1;
      const maxRadius = Math.min(centerX, centerY) * 1.5;

      for (let i = 0; i < bufferLength; i += 2) {
          const value = data[i];
          const radius = baseRadius + (maxRadius - baseRadius) * (value / 255);
          const hue = (i * 10) % 360;
          
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.1)`;
          ctx.lineWidth = 2 + (value / 50);
          ctx.stroke();
      }
  },
  (ctx, data, w, h) => {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, w, h);
      
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      
      const sliceWidth = w * 1.0 / bufferLength;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
          const value = data[i];
          const y = (value / 128.0) * (h / 4) + (h / 2); 
          
          if (i === 0) {
              ctx.moveTo(x, y);
          } else {
              ctx.lineTo(x, y);
          }
          x += sliceWidth;
      }
      
      ctx.lineTo(canvas.width, canvas.height / 2);
      
      let total = 0;
      for(let i=0; i<bufferLength; i++) total += data[i];
      const avg = total / bufferLength;
      const hue = (avg * 2) % 360;
      
      ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.8)`;
      ctx.lineWidth = 3;
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsla(${hue}, 100%, 50%, 0.5)`;
      ctx.stroke();
      ctx.shadowBlur = 0;
  },
  (ctx, data, w, h) => {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.fillRect(0, 0, w, h);

      const centerX = w / 2;
      const centerY = h / 2;
      
      for(let i=0; i<bufferLength; i += 4) {
          const value = data[i];
          const angle = (i / bufferLength) * Math.PI * 2;
          const time = Date.now() * 0.001;
          
          const distance = 100 + value * (2 + Math.sin(time + i*0.1));
          
          const x = centerX + Math.cos(angle) * distance;
          const y = centerY + Math.sin(angle) * distance;
          
          const size = 2 + value / 20;
          const hue = (i * 15 + time * 50) % 360;
          
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          
          ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.6)`;
          ctx.shadowBlur = size * 2;
          ctx.shadowColor = `hsla(${hue}, 100%, 70%, 0.4)`;
          ctx.fill();
      }
      ctx.shadowBlur = 0;
  },
  (ctx, data, w, h) => {
    ctx.clearRect(0,0,w,h);
  }
];

let currentEffect = 0;
const effectNames = ["Bars", "★ Stars", "Circles", "Wave", "Particles", "OFF"];

function drawEqualizer(){
  requestAnimationFrame(drawEqualizer);
  if(!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  effects[currentEffect](ctx, dataArray, canvas.width, canvas.height);
}

effectBtn.addEventListener('click', () => {
  currentEffect = (currentEffect + 1) % effects.length;
  effectBtn.textContent = effectNames[currentEffect];
});

volumeSlider.addEventListener('input', () => {
  audio.volume = volumeSlider.value / 100;
  volumeValue.textContent = `${volumeSlider.value}%`;
});

function decodeGreek(str){
  try{
    const decoder = new TextDecoder('windows-1253');
    const bytes = new Uint8Array([...str].map(c => c.charCodeAt(0)));
    return decoder.decode(bytes);
  } catch(e){ return str; }
}

async function fetchTitle() {
  if(isIntroActive) return; 
  
  if (isLive) {
    const url = STREAMS.live.statusUrl;
    try {
      const r = await fetch(url + (url.includes('?') ? '&' : '?') + "t=" + Date.now());
      const data = await r.json();
      let title = "";
      if(data.icestats && data.icestats.source){
        const src = Array.isArray(data.icestats.source) ? data.icestats.source.find(s => s.listenurl && s.listenurl.includes("/trela233")) : data.icestats.source;
        title = src && src.title ? src.title : "";
      }
      if(title) title = decodeGreek(title);
      nowPlayingEl.textContent = (title && title.trim()) || originalRadioName;
    } catch(e) { nowPlayingEl.textContent = originalRadioName; }
  } else {
    if (!zenoEventSource && !zenoPollInterval) startZenoSSE();
  }
}

function startZenoSSE(){
  stopZeno();
  const url = STREAMS.backup.zenoMetaUrl(STREAMS.backup.zenoStationId);
  try {
    zenoEventSource = new EventSource(url);
    zenoEventSource.onmessage = (ev) => {
      try {
        const d = JSON.parse(ev.data);
        const title = (d && d.streamTitle) ? String(d.streamTitle).trim() : "";
        nowPlayingEl.textContent = title && title.length ? title : originalRadioName;
      } catch(e){}
    };
    zenoEventSource.onerror = () => { stopZeno(); startZenoPolling(); };
  } catch(e){ startZenoPolling(); }
}

function startZenoPolling(){
  stopZeno();
  const fetchOnce = async () => {
    try{
      const r = await fetch(STREAMS.backup.zenoMetaUrl(STREAMS.backup.zenoStationId) + "?t=" + Date.now());
      const data = await r.json();
      const title = data && data.streamTitle ? String(data.streamTitle).trim() : "";
      nowPlayingEl.textContent = title && title.length ? title : originalRadioName;
    } catch(e){ nowPlayingEl.textContent = originalRadioName; }
  };
  fetchOnce();
  zenoPollInterval = setInterval(fetchOnce, 10000);
}

function stopZeno(){
  if(zenoEventSource){ try{ zenoEventSource.close(); }catch(e){} zenoEventSource = null; }
  if(zenoPollInterval){ clearInterval(zenoPollInterval); zenoPollInterval = null; }
}

function startAutoRetry(){
  if(window._playerRetryInterval) return;
  window._playerRetryInterval = setInterval(async () => {
    if(!isPlaying || isIntroActive) return; 
    if(!isLive){
      const test = new Audio(); test.crossOrigin = "anonymous"; test.src = STREAMS.live.streamUrl;
      try{ 
        await test.play(); test.pause(); test.src = ""; 
        playStream(STREAMS.live.streamUrl, true); 
      } catch(e){}
    }
  }, retryIntervalMs);
}

async function playStream(url, live=true){
  isIntroActive = false;
  skipBtn.style.display = "none";
  audio.pause(); audio.src = ""; isLive = live;
  
  if (!live) {
      stopZeno();
      startZenoSSE();
  } else {
      stopZeno();
  }

  modalText.textContent = live ? "Φόρτωση live streaming" : "παρακαλώ περιμένετε φόρτωση servers";
  loadingModal.style.display = "flex";
  statusEl.textContent = live ? "Φόρτωση Live Streaming" : "Φόρτωση, παρακαλώ περιμένετε";
  statusEl.className = "loading"; audio.src = url;
  try {
    await audio.play();
    loadingModal.style.display = "none";
    statusEl.textContent = live ? "ON AIR Radio Synnefa" : " ON AIR (Fallback)";
    statusEl.className = live ? "onair" : "offair";
    fetchTitle();
  } catch(e){
    if(live) playStream(STREAMS.backup.streamUrl, false);
    else { 
        modalText.textContent = "παρακαλώ περιμένετε φόρτωση servers";
        statusEl.textContent = "παρακαλώ περιμένετε φόρτωση server"; 
        statusEl.className = "offair"; 
    }
  }
}

async function startIntro() {
    isIntroActive = true;
    hasIntroPlayed = true;
    setupAudioNodes();
    audio.src = INTRO_URL;
    statusEl.textContent = "Παίζει Intro...";
    statusEl.className = "loading";
    nowPlayingEl.textContent = "Καλώς ήρθατε στο Ράδιο Σύννεφα";
    skipBtn.style.display = "flex";
    try {
        await audio.play();
        isPlaying = true;
        btn.textContent = "Pause";
        startAutoRetry();
    } catch(e) { playStream(STREAMS.live.streamUrl, true); }
}

let rotation = 0;
function rotateButton(){
  if(isPlaying){
    rotation += 0.2;
    visualizerCircle.style.transform = `scale(1.0) rotate(${rotation}deg)`; 
  }
  requestAnimationFrame(rotateButton);
}
requestAnimationFrame(rotateButton);

btn.addEventListener('click', () => {
  if(isPlaying){
    audio.pause();
    btn.textContent = "Play"; statusEl.textContent = "Παύση"; statusEl.className = "offair"; 
    isPlaying = false;
    skipBtn.style.display = "none";
    loadingModal.style.display = "none";
    stopZeno();
  } else {
    if(!hasIntroPlayed) {
        startIntro();
    } else {
        playStream(STREAMS.live.streamUrl, true);
        isPlaying = true;
        btn.textContent = "Pause";
        startAutoRetry();
    }
  }
});

skipBtn.addEventListener('click', () => { playStream(STREAMS.live.streamUrl, true); });

audio.addEventListener('error', () => { 
    if(isIntroActive) playStream(STREAMS.live.streamUrl, true);
    else if(isLive) playStream(STREAMS.backup.streamUrl, false); 
});

audio.addEventListener('ended', () => { 
    if(isIntroActive) playStream(STREAMS.live.streamUrl, true); 
    else if(isLive) playStream(STREAMS.backup.streamUrl, false); 
});

setInterval(() => { if(isPlaying && !isIntroActive && isLive) fetchTitle(); }, 15000);

let _breathRunning = false;
let lastLevel = 0;

function startButtonBreath(){
  if(_breathRunning) return;
  _breathRunning = true;
  
  function step(){
    let boost = 0;
    let targetGlow = 0;
    let musicHue = 174;
    
    if(analyser && dataArray && isPlaying && !audio.paused && (effectNames[currentEffect] !== "OFF")){ 
        analyser.getByteFrequencyData(dataArray);
        let bassSum = 0;
        for (let i = 0; i < 10; i++) bassSum += dataArray[i];
        let averageBass = bassSum / 10;
        let colorOscillation = Math.sin(averageBass * 0.05) * 180 + 180;
        musicHue = Math.floor(174 + colorOscillation) % 360;
        let currentLevel = averageBass / 255;
        let delta = currentLevel - lastLevel;
        if (delta < 0) delta = 0; 
        lastLevel = currentLevel; 
        boost = Math.min(delta * 5, 0.4); 
        targetGlow = Math.min(2.0, averageBass / 50);
        visualizerCircle.style.setProperty('--glow-size', Math.round(targetGlow * 130) + "px");
        visualizerCircle.style.setProperty('--glow-h', musicHue);
    } else {
        visualizerCircle.style.setProperty('--glow-size', "0px");
        visualizerCircle.style.setProperty('--glow-h', "174");
        boost = 0;
    }
    visualizerCircle.style.transform = `scale(${1 + boost}) rotate(${rotation}deg)`;
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
</script>
<script src="lock.js"></script>
</body>
</html>
