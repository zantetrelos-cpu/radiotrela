<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ράδιο Σύννεφα TV</title>
    <!-- Google Fonts για High-End Τυπογραφία -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome για high-end εικονίδια -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d11; /* Πιο βαθύ, μοντέρνο dark background */
            background-image: url('https://i.imgur.com/1MdMJho.png');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
        }

        .player-fullscreen {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe, .live-video-element, .backup-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            object-fit: contain; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(1.01); /* Subtle premium zoom κατά την εναλλαγή */
        }

        iframe { z-index: 1; }
        .live-video-element { z-index: 1; }
        .backup-video { z-index: 1; }

        .show-live-vdo iframe { z-index: 3; opacity: 1; transform: scale(1); }
        .show-live-hls #hlsPlayer { z-index: 3; opacity: 1; transform: scale(1); }
        .show-live-picarto #picartoPlayer { z-index: 3; opacity: 1; transform: scale(1); }
        .show-backup .backup-video { z-index: 3; opacity: 1; transform: scale(1); }

        .show-live-vdo, .show-live-hls, .show-live-picarto, .show-backup { background-image: none !important; }
        .show-loading iframe, .show-loading .live-video-element, .show-loading .backup-video { opacity: 0; z-index: 1; }

        .mouse-tracker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
        }

        /* Κρύβει το ποντίκι σε όλη την οθόνη όταν δεν κουνιέται */
        body.hide-cursor, body.hide-cursor * {
            cursor: none !important;
        }

        /* 🟢 SMART TV TOP HEADER */
        .player-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 60px 50px 40px 50px;
            background: linear-gradient(to bottom, rgba(13, 13, 17, 0.85) 0%, rgba(13, 13, 17, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
            pointer-events: none;
        }
        .player-header.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .brand-title {
            color: #fff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-title span {
            color: #ef4444;
            background: linear-gradient(135deg, #ff6b6b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .digital-clock {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.07);
            padding: 8px 16px;
            border-radius: 12px;
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        /* 🟣 FLOATING PREMIUM CONTROLS BAR */
        .player-controls-wrapper {
            position: absolute;
            bottom: 50px; /* Ιδανικό ύψος για Smart TV safe area */
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        .player-controls {
            background: rgba(19, 19, 26, 0.65);
            backdrop-filter: blur(35px) saturate(150%);
            -webkit-backdrop-filter: blur(35px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 32px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
            pointer-events: none;
        }

        .player-controls.visible { 
            opacity: 1; 
            transform: translateY(0);
        }

        /* 🔵 BUTTONS & INTERACTIVE ELEMENTS */
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.2px;
        }

        .fullscreen-btn:hover {
            background: #ffffff;
            color: #0d0d11;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,255,255,0.15);
        }
        
        .fullscreen-btn:active {
            transform: translateY(0);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 24px;
            height: 42px;
            border-radius: 50px;
            pointer-events: auto;
            color: white;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .volume-container.pulse-attention {
            animation: pulseSound 1.2s infinite alternate cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }

        @keyframes pulseSound {
            from { transform: scale(1); background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); }
            to { transform: scale(1.04); background: rgba(239, 68, 68, 0.8); border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); }
        }

        #volumeIcon {
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            font-size: 15px;
        }
        #volumeIcon:hover { transform: scale(1.2); }

        /* MODERN RANGE SLIDER */
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .volume-slider:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            transition: transform 0.15s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.35); }

        /* 🟠 MODERN LOADING & NOTICE CARD */
        .live-notice {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 13, 17, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            padding: 40px 50px;
            border-radius: 28px;
            text-align: center;
            backdrop-filter: blur(30px) saturate(140%);
            -webkit-backdrop-filter: blur(30px) saturate(140%);
            box-shadow: 0 30px 70px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            z-index: 15;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .notice-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }
        .notice-sub {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 28px;
            font-weight: 500;
            max-width: 280px;
            line-height: 1.4;
        }
         
        /* HIGH-END CSS SPINNER (WITH FADE TRAIL) */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #ef4444;
            border-right-color: rgba(239, 68, 68, 0.3); /* Smooth fade εφέ */
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.7s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🔴 LIVE BADGE */
        .live-badge {
            position: absolute;
            top: 26px;
            right: 52px;
            background: linear-gradient(135deg, #ff4b4b, #ef4444);
            color: white;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 11px;
            z-index: 100;
            display: none; 
            text-transform: uppercase;
            align-items: center;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: fadeInBadge 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
        }
        @keyframes fadeInBadge { from { opacity: 0; transform: scale(0.8) translateY(-5px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .live-badge::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-radius: 50%;
            animation: blinker 0.8s cubic-bezier(.5, 0, 1, 1) infinite alternate;
            margin-right: 8px;
            box-shadow: 0 0 8px #fff;
        }
        @keyframes blinker { from { opacity: 1; } to { opacity: 0.3; } }

        .show-live-vdo .live-badge, 
        .show-live-hls .live-badge, 
        .show-live-picarto .live-badge { 
            display: flex; 
        }
    </style>
</head>
<body class="show-loading"> 
    <div class="player-fullscreen" id="mainContainer">
         
        <!-- Smart TV Header -->
        <div class="player-header" id="playerHeader">
            <div class="brand-title">Ράδιο Σύννεφα <span>TV</span></div>
            <div class="digital-clock" id="digitalClock">00:00:00</div>
        </div>

        <div class="live-badge">ΖΩΝΤΑΝΑ</div>

        <!-- Premium Notice Loading Box -->
        <div id="noticeMessage" class="live-notice">
            <div class="notice-title">Ράδιο Σύννεφα TV</div>
            <div class="notice-sub">Γίνεται αυτόματη σύνδεση με τη ροή του Live Stream...</div>
            <div class="spinner"></div>
        </div>

        <div class="mouse-tracker" id="tracker"></div>

        <video id="backupVideo" class="backup-video" src="https://res.cloudinary.com/dtiuiw8sp/video/upload/v1778706107/spot_radio_sinefa_tv_xatuhk.mp4" muted playsinline></video>

        <iframe id="vdoPlayer" 
                src="https://vdo.ninja/?view=SiDsgNa&cleanoutput&transparent&autoplay&api=1" 
                allow="autoplay; autofocus; encrypted-media">
        </iframe>

        <video id="hlsPlayer" class="live-video-element" muted playsinline></video>

        <video id="picartoPlayer" class="live-video-element" src="https://edge1-eu-west.picarto.tv/stream/golive%2bzakynthos.mp4" muted playsinline></video>

        <!-- Floating Controls Panel -->
        <div class="player-controls-wrapper">
            <div class="player-controls" id="playerControls">
                <div class="volume-container pulse-attention" id="volumeContainer">
                    <span id="volumeIcon"><i class="fas fa-volume-mute"></i></span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="0">
                </div>
                 
                <button id="fsToggle" class="fullscreen-btn">
                    <span id="fsIcon"><i class="fas fa-expand"></i></span> 
                    <span id="fsText">Πλήρης Οθόνη</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('vdoPlayer');
        const hlsPlayer = document.getElementById('hlsPlayer');
        const picartoPlayer = document.getElementById('picartoPlayer');
        const backupVideo = document.getElementById('backupVideo');
        const controls = document.getElementById('playerControls');
        const header = document.getElementById('playerHeader');
        const tracker = document.getElementById('tracker');
        const container = document.getElementById('mainContainer');
        const notice = document.getElementById('noticeMessage');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeIcon = document.getElementById('volumeIcon');
        const fsButton = document.getElementById('fsToggle');
        const fsIcon = document.getElementById('fsIcon');
        const fsText = document.getElementById('fsText');
        const volumeContainer = document.getElementById('volumeContainer');
        const clockEl = document.getElementById('digitalClock');

        let hideTimeout;
        const HIDE_DELAY_MS = 3500; 
        let currentMode = "loading";
        let lastMessageTime = Date.now();
        let isFirstLoad = true; 

        let isVdoActive = false;
        let isHlsActive = false;
        let isPicartoActive = false;

        let lastPicartoTime = -1;
        let picartoFreezeCounter = 0;

        const m3u8Url = "https://lbgo.bozztv.com/ssh101/ssh101/radiotvtrela/playlist.m3u8";
        let hlsInstance = null;

        const playlist = [
            "https://res.cloudinary.com/dtiuiw8sp/video/upload/v1778706107/spot_radio_sinefa_tv_xatuhk.mp4", 
            "https://res.cloudinary.com/dtiuiw8sp/video/upload/v1778689946/dokimisakis_rouvlp.mp4",        
            "https://res.cloudinary.com/dtiuiw8sp/video/upload/v1756023318/spot2_djefej.mp4",                
            "https://res.cloudinary.com/dtiuiw8sp/video/upload/v1755723079/download_l6ccgd.mp4",             
            "https://video.gumlet.io/676da5bee52b1079305dbcd3/677839eaabb26867fdbf5938/download.mp4",       
            "https://video.gumlet.io/676da5bee52b1079305dbcd3/67dc0c9d4c720203cbdded25/download.mp4"         
        ];
        let currentVideoIndex = 0;

        // Ρολόι πραγματικού χρόνου
        const updateClock = () => {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('el-GR');
        };
        setInterval(updateClock, 1000);
        updateClock();

        backupVideo.addEventListener('ended', () => {
            currentVideoIndex++;
            if (currentVideoIndex >= playlist.length) { currentVideoIndex = 0; }
            backupVideo.src = playlist[currentVideoIndex];
            if (currentMode === "backup") {
                backupVideo.play().catch(e => console.log(e));
            }
        });

        // Διαχείριση εμφάνισης/εξαφανισης UI και Ποντικιού
        const showUI = () => {
            controls.classList.add('visible');
            header.classList.add('visible');
            document.body.classList.remove('hide-cursor'); 
            
            clearTimeout(hideTimeout);
            if (!volumeContainer.classList.contains('pulse-attention')) {
                hideTimeout = setTimeout(() => { 
                    controls.classList.remove('visible'); 
                    header.classList.remove('visible'); 
                    document.body.classList.add('hide-cursor'); 
                }, HIDE_DELAY_MS);
            }
        };

        tracker.addEventListener('mousemove', showUI);
        controls.addEventListener('mousemove', showUI);
        container.addEventListener('mousemove', showUI);
        showUI();

        setTimeout(() => { notice.style.opacity = "0"; }, 6000);

        const sendVdoCommand = (command, value) => {
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ [command]: value }, '*');
            }
        };

        function initHlsPlayer() {
            if (Hls.isSupported()) {
                if (hlsInstance) { hlsInstance.destroy(); }
                hlsInstance = new Hls({
                    manifestLoadingTimeOut: 4000,
                    manifestLoadingMaxRetry: 1,
                    liveDurationInfinity: true
                });
                hlsInstance.loadSource(m3u8Url);
                hlsInstance.attachMedia(hlsPlayer);
                
                hlsInstance.on(Hls.Events.FRAG_CHANGED, () => {
                    isHlsActive = true;
                    evaluateStreamPriority();
                });

                hlsInstance.on(Hls.Events.ERROR, () => {
                    isHlsActive = false;
                    evaluateStreamPriority();
                });
            }
        }

        iframe.addEventListener('load', () => {
            sendVdoCommand('mute', true);
            initHlsPlayer();
            picartoPlayer.play().catch(() => {});
        });

        window.addEventListener('message', (e) => {
            if (!e.data) return;
            lastMessageTime = Date.now();

            if (e.data.action === 'video-loaded' || e.data.event === 'wfs-video-loaded' || e.data.streamID) {
                isVdoActive = true;
                evaluateStreamPriority();
            }

            if (e.data.action === 'stream-dropped' || e.data.event === 'video-removed' || e.data.action === 'stopped') {
                isVdoActive = false;
                evaluateStreamPriority();
            }
        });

        picartoPlayer.addEventListener('playing', () => {
            isPicartoActive = true;
            picartoFreezeCounter = 0; 
            evaluateStreamPriority();
        });

        picartoPlayer.addEventListener('error', () => {
            isPicartoActive = false;
            evaluateStreamPriority();
        });

        setInterval(() => {
            if (currentMode === "live-picarto") {
                if (picartoPlayer.currentTime === lastPicartoTime) {
                    picartoFreezeCounter++;
                    if (picartoFreezeCounter >= 3) {
                        isPicartoActive = false;
                        picartoFreezeCounter = 0;
                        evaluateStreamPriority(); 
                    }
                } else {
                    picartoFreezeCounter = 0; 
                }
                lastPicartoTime = picartoPlayer.currentTime;
            }
        }, 1000);

        function evaluateStreamPriority() {
            if (isVdoActive) {
                if (currentMode !== "live-vdo") {
                    currentMode = "live-vdo";
                    document.body.className = "show-live-vdo";
                    backupVideo.pause();
                    hlsPlayer.pause();
                    picartoPlayer.pause();
                    isFirstLoad = false;
                }
                return;
            }

            if (isHlsActive) {
                if (currentMode !== "live-hls") {
                    currentMode = "live-hls";
                    document.body.className = "show-live-hls";
                    backupVideo.pause();
                    picartoPlayer.pause();
                    hlsPlayer.play().catch(() => {});
                    isFirstLoad = false;
                }
                return;
            }

            if (isPicartoActive) {
                if (currentMode !== "live-picarto") {
                    currentMode = "live-picarto";
                    document.body.className = "show-live-picarto";
                    backupVideo.pause();
                    hlsPlayer.pause();
                    picartoPlayer.play().catch(() => {});
                    isFirstLoad = false;
                }
                return;
            }

            if (currentMode !== "backup") {
                document.body.className = "show-loading";
                switchToBackup();
            }
        }

        function switchToBackup() {
            currentMode = "backup";
            document.body.className = "show-backup";
            hlsPlayer.pause();
            picartoPlayer.pause();

            if (isFirstLoad) {
                currentVideoIndex = 0;
                backupVideo.src = playlist[0];
                isFirstLoad = false; 
            } else {
                const randomIndex = Math.floor(Math.random() * playlist.length);
                currentVideoIndex = randomIndex;
                backupVideo.src = playlist[currentVideoIndex];
            }

            backupVideo.play().catch(err => console.log("Autoplay block:", err));
        }

        setTimeout(() => {
            if (currentMode === "loading" && !isVdoActive && !isHlsActive && !isPicartoActive) {
                switchToBackup();
            }
        }, 3500);

        setInterval(() => {
            if (currentMode === "live-vdo") {
                sendVdoCommand('get_state', true);
                if (Date.now() - lastMessageTime > 4000) {
                    isVdoActive = false;
                    evaluateStreamPriority();
                }
            }
        }, 2000);

        setInterval(() => {
            if (!isVdoActive && currentMode === "backup") {
                initHlsPlayer();
                picartoPlayer.load();
                picartoPlayer.play().catch(() => {});
            }
        }, 12000);

        function updateAllVolumes(volumeValue) {
            const volumeRatio = volumeValue / 100;

            if (volumeValue > 0) {
                sendVdoCommand('mute', false);
                sendVdoCommand('volume', volumeRatio);
                
                backupVideo.muted = false;
                backupVideo.volume = volumeRatio;

                hlsPlayer.muted = false;
                hlsPlayer.volume = volumeRatio;

                picartoPlayer.muted = false;
                picartoPlayer.volume = volumeRatio;
                
                if (volumeValue < 40) volumeIcon.innerHTML = '<i class="fas fa-volume-down"></i>';
                else if (volumeValue < 80) volumeIcon.innerHTML = '<i class="fas fa-volume-up"></i>';
                else volumeIcon.innerHTML = '<i class="fas fa-volume-up" style="color:#ef4444; filter: drop-shadow(0 0 5px #ef4444);"></i>';
            } else {
                sendVdoCommand('mute', true);
                backupVideo.muted = true;
                hlsPlayer.muted = true;
                picartoPlayer.muted = true;
                volumeIcon.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            e.stopPropagation();
            volumeContainer.classList.remove('pulse-attention');
            showUI();
            updateAllVolumes(volumeSlider.value);
        });

        volumeIcon.addEventListener('click', (e) => {
            e.stopPropagation();
            volumeContainer.classList.remove('pulse-attention');
            volumeSlider.value = 100; 
            updateAllVolumes(100); 
            showUI();
        });

        volumeSlider.addEventListener('click', (e) => { e.stopPropagation(); });

        fsButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err.message));
            } else {
                document.exitFullscreen();
            }
            showUI();
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsIcon.innerHTML = '<i class="fas fa-compress"></i>';
                fsText.textContent = "Έξοδος";
            } else {
                fsIcon.innerHTML = '<i class="fas fa-expand"></i>';
                fsText.textContent = "Πλήρης Οθόνη";
            }
        });
    </script>
</body>
</html>
